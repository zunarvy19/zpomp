# HTTP → HTTPS
server {
    listen 80;
    server_name zunaidipompa.zvy.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zunaidipompa.zvy.my.id;

    ssl_certificate /etc/letsencrypt/live/zunaidipompa.zvy.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zunaidipompa.zvy.my.id/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}